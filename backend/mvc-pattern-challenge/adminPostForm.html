{% extends "_baseLayout.html" %}

{% block page_header %}
<header
        class="masthead"
        style='...'
>
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-md-10 col-lg-8 col-xl-7">
                <div class="page-heading">
                    <h1>{{ pageTitle }}</h1>
                    <span class="subheading">Manage blog content</span>
                </div>
            </div>
        </div>
    </div>
</header>
{% endblock page_header %}

{% block main_content %}
<main class="container px-4 px-lg-5">
    <div class="row gx-4 gx-lg-5 justify-content-center">
        <div class="col-md-10 col-lg-8 col-xl-7">
            <form method="POST" action="{{ formAction }}">
                <div class="mb-3">
                    <label class="form-label" for="title">Title</label>
                    <input
                            class="form-control"
                            id="title"
                            name="title"
                            type="text"
                            value="{{ post.title }}"
                            required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="image">Image filename</label>
                    <input
                            class="form-control"
                            id="image"
                            name="image"
                            type="text"
                            value="{{ post.image }}"
                            placeholder="img/home-bg.jpg"
                            required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="author">Author</label>
                    <input
                            class="form-control"
                            id="author"
                            name="author"
                            type="text"
                            value="{{ post.author }}"
                            required
                    />
                </div>

                <div class="mb-3">
                    <label class="form-label" for="teaser">Teaser</label>
                    <textarea
                            class="form-control"
                            id="teaser"
                            name="teaser"
                            rows="3"
                            required
                    >{{ post.teaser }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="content">Content HTML</label>
                    <textarea
                            class="form-control"
                            id="content"
                            name="content"
                            rows="10"
                            required
                    >{{ post.content }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-primary text-uppercase" type="submit">
                        {{ submitLabel }}
                    </button>

                    <a class="btn btn-secondary text-uppercase" href="/admin">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock main_content %}
